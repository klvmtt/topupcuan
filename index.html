<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>TOPUPCUAN.COM - Telegram Group</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold-1: #fff6bf;
      --gold-2: #ffe07a;
      --gold-3: #ffcb47;
      --gold-4: #ffb300;
      --bg-1: #020202;
      --bg-2: #0d0b03;
      --bg-3: #151103;
      --odo-h: 24px;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 15% 15%, rgba(255, 214, 90, 0.18), transparent 30%),
        radial-gradient(circle at 85% 20%, rgba(255, 179, 0, 0.16), transparent 30%),
        radial-gradient(circle at 50% 100%, rgba(255, 214, 90, 0.16), transparent 35%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 45%, var(--bg-3) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          45deg,
          rgba(255, 220, 120, 0.018) 0px,
          rgba(255, 220, 120, 0.018) 1px,
          transparent 1px,
          transparent 10px
        ),
        linear-gradient(
          120deg,
          transparent,
          rgba(255, 220, 120, 0.04),
          transparent
        );
      animation: bodySheen 10s linear infinite;
    }

    @keyframes bodySheen {
      0% { transform: translateX(-60px); }
      100% { transform: translateX(60px); }
    }

    .topbar {
      position: relative;
      z-index: 30;
      height: 62px;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0, 0, 0, 0.86);
      border-bottom: 1px solid rgba(255, 218, 111, 0.22);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow:
        0 0 20px rgba(255, 179, 0, 0.22),
        inset 0 -1px 0 rgba(255, 255, 255, 0.04);
    }

    .brand-logo {
      width: 145px;
      height: 46px;
      object-fit: contain;
      display: block;
      border-radius: 0;
      filter:
        drop-shadow(0 0 10px rgba(255, 220, 120, 0.55))
        drop-shadow(0 0 24px rgba(255, 179, 0, 0.35));
    }

    .topup-btn {
      position: relative;
      min-height: 38px;
      padding: 0 20px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #1b1400;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.25px;
      background: linear-gradient(135deg, var(--gold-1), var(--gold-2) 30%, var(--gold-3) 65%, var(--gold-4));
      border: 1px solid rgba(255, 255, 255, 0.45);
      box-shadow:
        0 0 14px rgba(255, 214, 90, 0.6),
        0 0 34px rgba(255, 179, 0, 0.32),
        inset 0 0 12px rgba(255, 255, 255, 0.45);
      overflow: hidden;
      animation: btnSmallPulse 1.8s ease-in-out infinite alternate;
    }

    .topup-btn::before,
    .action-btn::before {
      content: "";
      position: absolute;
      top: -140%;
      left: -70%;
      width: 48%;
      height: 340%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.98), transparent);
      transform: rotate(25deg);
      animation: btnShine 2.15s infinite;
      z-index: 1;
    }

    .topup-btn::after,
    .action-btn::after {
      content: "";
      position: absolute;
      inset: 3px;
      border-radius: inherit;
      border: 1px solid rgba(255, 255, 255, 0.32);
      pointer-events: none;
      z-index: 2;
    }

    @keyframes btnShine {
      0% { left: -70%; opacity: 0; }
      22% { opacity: 1; }
      55% { left: 130%; opacity: 0; }
      100% { left: 130%; opacity: 0; }
    }

    @keyframes btnSmallPulse {
      from { transform: scale(1); }
      to { transform: scale(1.04); }
    }

    .orb {
      position: fixed;
      pointer-events: none;
      z-index: 1;
      border-radius: 50%;
      filter: blur(18px);
      opacity: 0.75;
      animation: orbMove 8s ease-in-out infinite alternate;
    }

    .orb1 {
      width: 300px;
      height: 300px;
      left: -110px;
      top: 120px;
      background: radial-gradient(circle, rgba(255, 214, 90, 0.28), transparent 68%);
    }

    .orb2 {
      width: 360px;
      height: 360px;
      right: -130px;
      bottom: 40px;
      background: radial-gradient(circle, rgba(255, 179, 0, 0.22), transparent 68%);
      animation-delay: 1.7s;
    }

    .orb3 {
      width: 220px;
      height: 220px;
      left: 40%;
      top: 72%;
      background: radial-gradient(circle, rgba(255, 232, 140, 0.15), transparent 68%);
      animation-delay: 0.9s;
    }

    @keyframes orbMove {
      from { transform: translateY(0) scale(1); }
      to { transform: translateY(70px) scale(1.15); }
    }

    .gold-particles,
    .bg-characters,
    .sparkles {
      position: fixed;
      inset: 62px 0 0 0;
      overflow: hidden;
      pointer-events: none;
    }

    .gold-particles { z-index: 2; }
    .bg-characters { z-index: 3; }
    .sparkles { z-index: 4; }

    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: particleFloat linear infinite;
      background: radial-gradient(
        circle,
        rgba(255, 245, 180, 0.95),
        rgba(255, 195, 60, 0.65) 45%,
        rgba(255, 179, 0, 0.08) 75%,
        transparent 100%
      );
      box-shadow:
        0 0 6px rgba(255, 232, 135, 0.7),
        0 0 18px rgba(255, 179, 0, 0.35);
    }

    @keyframes particleFloat {
      0% {
        transform: translate3d(0, 0, 0) scale(0.55);
        opacity: 0;
      }
      12% { opacity: 0.7; }
      80% { opacity: 0.45; }
      100% {
        transform: translate3d(var(--drift-x), -220px, 0) scale(1.1);
        opacity: 0;
      }
    }

    .spark {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      opacity: 0;
      background: #fff0a5;
      box-shadow:
        0 0 10px #ffe07a,
        0 0 22px #ffb300;
      animation: sparkRise linear infinite;
    }

    @keyframes sparkRise {
      0% {
        transform: translateY(0) scale(0.5);
        opacity: 0;
      }
      18% { opacity: 1; }
      100% {
        transform: translateY(-170px) scale(1.25);
        opacity: 0;
      }
    }

    .char {
      position: absolute;
      opacity: 0;
      animation:
        charFade var(--fadeDur) ease-in-out infinite,
        charDrift calc(var(--fadeDur) + 2s) ease-in-out infinite alternate;
      will-change: transform, opacity;
      filter:
        drop-shadow(0 0 10px rgba(255, 222, 130, 0.7))
        drop-shadow(0 0 24px rgba(255, 179, 0, 0.28));
    }

    .char-move {
      display: block;
      width: 100%;
      animation: charSide var(--sideDur) ease-in-out infinite alternate;
    }

    .char img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      opacity: 0.88;
      animation: charBob calc(var(--fadeDur) - 0.6s) ease-in-out infinite alternate;
      transform-origin: center center;
    }

    @keyframes charFade {
      0% {
        opacity: 0;
        transform: scale(0.72) translateY(26px) rotate(-5deg);
      }
      18% { opacity: 0.16; }
      42% {
        opacity: var(--maxOpacity);
        transform: scale(1) translateY(0) rotate(2deg);
      }
      72% { opacity: calc(var(--maxOpacity) * 0.65); }
      100% {
        opacity: 0;
        transform: scale(0.8) translateY(-24px) rotate(-4deg);
      }
    }

    @keyframes charDrift {
      from { margin-left: calc(var(--driftAmp) * -1); }
      to { margin-left: var(--driftAmp); }
    }

    @keyframes charBob {
      from { transform: translateY(0px) scale(1); }
      to { transform: translateY(-10px) scale(1.02); }
    }

    @keyframes charSide {
      from { transform: translateX(calc(var(--sideAmp) * -1)); }
      to { transform: translateX(var(--sideAmp)); }
    }

    .page {
      position: relative;
      z-index: 10;
      min-height: calc(100vh - 62px);
      padding: 34px 16px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .card {
      position: relative;
      width: min(490px, 100%);
      padding: 36px 24px 34px;
      border-radius: 24px;
      text-align: center;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.04)),
        linear-gradient(180deg, rgba(255, 226, 136, 0.08), rgba(255, 204, 88, 0.02)),
        rgba(10, 10, 10, 0.44);
      border: 1px solid rgba(255, 225, 130, 0.26);
      box-shadow:
        0 10px 40px rgba(0, 0, 0, 0.45),
        0 0 24px rgba(255, 210, 94, 0.16),
        0 0 70px rgba(255, 179, 0, 0.10),
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        inset 0 0 20px rgba(255, 220, 120, 0.05);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      overflow: hidden;
      animation: cardGlow 2.8s ease-in-out infinite alternate;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.18), transparent 22%),
        radial-gradient(circle at top left, rgba(255, 242, 190, 0.15), transparent 35%);
      pointer-events: none;
      z-index: 0;
    }

    .card::after {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      top: 10px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.55), transparent);
      pointer-events: none;
      z-index: 0;
    }

    @keyframes cardGlow {
      from {
        box-shadow:
          0 10px 40px rgba(0, 0, 0, 0.45),
          0 0 22px rgba(255, 210, 94, 0.14),
          0 0 58px rgba(255, 179, 0, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.16),
          inset 0 0 18px rgba(255, 220, 120, 0.04);
      }
      to {
        box-shadow:
          0 12px 46px rgba(0, 0, 0, 0.50),
          0 0 32px rgba(255, 221, 125, 0.26),
          0 0 90px rgba(255, 179, 0, 0.16),
          inset 0 1px 0 rgba(255, 255, 255, 0.20),
          inset 0 0 26px rgba(255, 220, 120, 0.08);
      }
    }

    .card-content {
      position: relative;
      z-index: 2;
    }

    .group-icon-wrap {
      width: 128px;
      height: 128px;
      margin: 0 auto 20px;
      border-radius: 50%;
      padding: 18px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0.10));
      border: 1px solid rgba(255, 255, 255, 0.26);
      box-shadow:
        0 0 16px rgba(255, 226, 136, 0.20),
        0 0 40px rgba(255, 179, 0, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.24);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .group-icon {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      padding: 14px;
      object-fit: contain;
      background: linear-gradient(135deg, var(--gold-1), var(--gold-2), var(--gold-4));
      border: 2px solid rgba(255, 255, 255, 0.42);
      box-shadow:
        0 0 18px rgba(255, 218, 111, 0.50),
        0 0 42px rgba(255, 179, 0, 0.22),
        inset 0 0 14px rgba(255, 255, 255, 0.40);
    }

    h1 {
      font-size: 27px;
      font-weight: 900;
      letter-spacing: 0.35px;
      margin-bottom: 10px;
      color: #fff8d7;
      text-shadow:
        0 0 9px rgba(255, 220, 120, 0.55),
        0 0 20px rgba(255, 179, 0, 0.22);
    }

    .subs {
      margin-bottom: 26px;
      color: rgba(255, 255, 255, 0.88);
      font-size: 15px;
      min-height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .roller {
      height: var(--odo-h);
      line-height: var(--odo-h);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 1px;
      color: #fff4be;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.5px;
      font-variant-numeric: tabular-nums;
      text-shadow:
        0 0 8px rgba(255, 220, 120, 0.75),
        0 0 18px rgba(255, 179, 0, 0.35);
    }

    .odo-digit {
      width: 13px;
      height: var(--odo-h);
      overflow: hidden;
      display: inline-block;
      position: relative;
    }

    .odo-strip {
      display: block;
      transition: transform 850ms cubic-bezier(0.18, 0.88, 0.24, 1);
      will-change: transform;
    }

    .odo-strip span {
      display: block;
      width: 13px;
      height: var(--odo-h);
      line-height: var(--odo-h);
      text-align: center;
      font-size: 18px;
      font-weight: 900;
    }

    .odo-sep {
      height: var(--odo-h);
      line-height: var(--odo-h);
      display: inline-block;
      padding: 0 1px;
      color: #fff4be;
      font-size: 18px;
      font-weight: 900;
    }

    .subs-label {
      opacity: 0.9;
      font-size: 15px;
      line-height: var(--odo-h);
    }

    .action-buttons {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 13px;
      align-items: center;
    }

    .action-btn-wrap {
      position: relative;
      width: min(390px, 100%);
      display: flex;
      justify-content: center;
    }

    .action-btn-wrap::before,
    .action-btn-wrap::after {
      content: "";
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      pointer-events: none;
    }

    .action-btn-wrap::before {
      width: 100%;
      height: 62px;
      background: radial-gradient(circle, rgba(255, 221, 125, 0.34), transparent 68%);
      filter: blur(10px);
      animation: glowBreath 1.75s ease-in-out infinite;
    }

    .action-btn-wrap::after {
      width: 100%;
      height: 54px;
      border: 1px solid rgba(255, 228, 138, 0.35);
      animation: pulseRing 1.75s ease-in-out infinite;
    }

    .action-btn {
      position: relative;
      z-index: 2;
      width: 100%;
      min-height: 50px;
      padding: 0 16px;
      border-radius: 999px;
      display: grid;
      grid-template-columns: 36px 1fr 36px;
      align-items: center;
      text-decoration: none;
      color: #1a1300;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.15px;
      text-align: center;
      white-space: nowrap;
      background:
        linear-gradient(135deg, #fffbe0 0%, #ffe78c 25%, #ffce4f 58%, #ffb300 100%);
      border: 1px solid rgba(255, 255, 255, 0.56);
      box-shadow:
        0 0 18px rgba(255, 214, 90, 0.58),
        0 0 48px rgba(255, 179, 0, 0.30),
        inset 0 0 14px rgba(255, 255, 255, 0.55),
        inset 0 -3px 8px rgba(166, 104, 0, 0.22);
      overflow: hidden;
      animation: actionPulse 1.5s ease-in-out infinite alternate;
    }

    .action-btn:hover {
      transform: translateY(-2px) scale(1.035);
      box-shadow:
        0 0 26px rgba(255, 235, 150, 0.85),
        0 0 70px rgba(255, 179, 0, 0.48),
        inset 0 0 18px rgba(255, 255, 255, 0.68);
    }

    .action-btn span,
    .action-btn svg {
      position: relative;
      z-index: 3;
    }

    .btn-icon {
      grid-column: 1;
      justify-self: center;
      width: 28px;
      height: 28px;
      min-width: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(20, 13, 0, 0.13);
      box-shadow:
        0 0 10px rgba(255, 255, 255, 0.4),
        inset 0 0 9px rgba(255, 255, 255, 0.35);
      animation:
        iconFloat 1.45s ease-in-out infinite alternate,
        iconGlow 1.2s ease-in-out infinite alternate;
    }

    .btn-icon svg {
      width: 19px;
      height: 19px;
      display: block;
    }

    .btn-label {
      grid-column: 2;
      justify-self: center;
      width: 100%;
      text-align: center;
      white-space: nowrap;
      line-height: 1;
      overflow: visible;
    }

    .youtube-btn .btn-icon {
      background: linear-gradient(135deg, #ff3131, #b90000);
    }

    .telegram-btn .btn-icon {
      background: linear-gradient(135deg, #39c6ff, #1588d6);
    }

    .info-btn .btn-icon {
      background: linear-gradient(135deg, #fff1a0, #ffb300);
    }

    .youtube-btn .btn-icon svg,
    .telegram-btn .btn-icon svg {
      fill: #fff;
    }

    .info-btn .btn-icon svg {
      fill: #201400;
    }

    .info-btn {
      font-size: 12.2px;
      letter-spacing: 0;
    }

    @keyframes actionPulse {
      from {
        transform: scale(1);
        box-shadow:
          0 0 18px rgba(255, 214, 90, 0.50),
          0 0 42px rgba(255, 179, 0, 0.24),
          inset 0 0 12px rgba(255, 255, 255, 0.48);
      }
      to {
        transform: scale(1.025);
        box-shadow:
          0 0 25px rgba(255, 226, 136, 0.78),
          0 0 68px rgba(255, 179, 0, 0.42),
          inset 0 0 18px rgba(255, 255, 255, 0.62);
      }
    }

    @keyframes glowBreath {
      0%, 100% {
        opacity: 0.55;
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.08);
      }
    }

    @keyframes pulseRing {
      0% {
        opacity: 0.75;
        transform: translate(-50%, -50%) scale(1);
      }
      70% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.13);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.16);
      }
    }

    @keyframes iconFloat {
      from {
        transform: translateY(0) rotate(-4deg) scale(1);
      }
      to {
        transform: translateY(-4px) rotate(5deg) scale(1.08);
      }
    }

    @keyframes iconGlow {
      from {
        filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.45));
      }
      to {
        filter: drop-shadow(0 0 10px rgba(255, 245, 170, 0.95));
      }
    }

    @media (max-width: 520px) {
      :root {
        --odo-h: 23px;
      }

      .topbar {
        height: 60px;
        padding: 8px 10px;
      }

      .brand-logo {
        width: 118px;
        height: 42px;
      }

      .topup-btn {
        min-height: 35px;
        padding: 0 13px;
        font-size: 11px;
      }

      .page {
        min-height: calc(100vh - 60px);
        padding-top: 30px;
      }

      .card {
        width: min(380px, 100%);
        padding: 30px 14px 30px;
        border-radius: 22px;
      }

      .group-icon-wrap {
        width: 118px;
        height: 118px;
      }

      .group-icon {
        width: 86px;
        height: 86px;
      }

      h1 {
        font-size: 24px;
      }

      .subs {
        font-size: 14px;
      }

      .roller,
      .odo-strip span,
      .odo-sep {
        font-size: 17px;
      }

      .odo-digit,
      .odo-strip span {
        width: 12px;
      }

      .action-btn-wrap {
        width: min(350px, 100%);
      }

      .action-btn {
        min-height: 48px;
        padding: 0 10px;
        grid-template-columns: 30px 1fr 30px;
        font-size: 11.5px;
        letter-spacing: 0;
      }

      .info-btn {
        font-size: 10.4px;
        letter-spacing: -0.2px;
      }

      .btn-icon {
        width: 25px;
        height: 25px;
        min-width: 25px;
      }

      .btn-icon svg {
        width: 17px;
        height: 17px;
      }

      .char {
        max-width: 125px;
      }
    }

    /* Optimasi mobile:
       karakter dan partikel background dimatikan di HP supaya halaman lebih responsif dan tidak ngelag.
       Efek utama seperti tombol dan subscriber roller tetap jalan normal. */
    @media (max-width: 768px) {
      html,
      body {
        width: 100%;
        min-height: 100dvh;
      }

      body {
        overflow-x: hidden;
        -webkit-text-size-adjust: 100%;
        touch-action: manipulation;
      }

      .bg-characters,
      .gold-particles,
      .sparkles {
        display: none !important;
      }

      .char,
      .char-move,
      .char img,
      .particle,
      .spark {
        animation: none !important;
        display: none !important;
      }

      .page {
        min-height: calc(100dvh - 60px);
        padding: 22px 12px max(24px, env(safe-area-inset-bottom));
        align-items: center;
      }

      .card {
        width: min(100%, 390px);
        max-width: 100%;
      }

      .action-btn,
      .topup-btn,
      .card {
        transform: translateZ(0);
        backface-visibility: hidden;
      }
    }

    @media (max-width: 360px) {
      .topbar {
        padding-inline: 8px;
      }

      .brand-logo {
        width: 106px;
      }

      .topup-btn {
        padding: 0 10px;
        font-size: 10px;
      }

      .card {
        padding-inline: 12px;
      }

      .action-btn {
        grid-template-columns: 28px 1fr 28px;
        font-size: 10.8px;
      }

      .info-btn {
        font-size: 9.8px;
      }
    }

  </style>
</head>

<body>
  <header class="topbar">
    <img
      class="brand-logo"
      src="https://cdn.aplikasikreasi.id/MER_01KTFSA5ZYMH1PWE4JXPXSDS25/1782072751904_CJ6aKg_topupcuan_swing_kilat_550x200_TRANSPARENT.gif"

  <main class="page">
    <section class="card">

          />
        </div>

        <h1>TOPUPCUAN.COM</h1>

        <div class="subs">
          <span class="roller" id="subscriberRoller"></span>
          <span class="subs-label">subscribers</span>
        </div>

        <div class="action-buttons">
          <div class="action-btn-wrap">
            <a class="action-btn telegram-btn" href="tg://join?invite=tasc9CEInas0ZjBl">
              <span class="btn-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M21.94 4.16c.3-1.22-.88-1.74-1.75-1.38L2.7 9.9c-1.2.48-1.18 1.16-.2 1.47l4.48 1.4L17.36 6.2c.5-.3.94-.13.57.2L9.52 14l-.32 4.78c.47 0 .68-.22.94-.48l2.26-2.2 4.7 3.48c.87.48 1.49.23 1.7-.8l3.14-14.62z"/>

          <div class="action-btn-wrap">

              <span class="btn-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M23.5 6.2s-.23-1.65-.95-2.38c-.91-.95-1.94-.96-2.41-1.01C16.78 2.56 12 2.56 12 2.56h-.01s-4.78 0-8.14.25c-.47.05-1.5.06-2.41 1.01C.72 4.55.5 6.2.5 6.2S.26 8.13.26 10.06v1.82c0 1.93.24 3.86.24 3.86s.23 1.65.95 2.38c.91.95 2.1.92 2.63 1.02 1.91.18 7.92.24 7.92.24s4.78-.01 8.14-.26c.47-.05 1.5-.06 2.41-1.01.72-.73.95-2.38.95-2.38s.24-1.93.24-3.86v-1.82c0-1.93-.24-3.86-.24-3.86zM9.68 14.15V7.46l6.16 3.36-6.16 3.33z"/>
                </svg>
              </span>

          <div class="action-btn-wrap">
            <a class="action-btn info-btn" href="https://topupcuan.com/blog" target="_blank" rel="noopener">
              <span class="btn-icon">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M18 3h2.5c.83 0 1.5.67 1.5 1.5V7c0 3.02-2.24 5.52-5.15 5.94A6.98 6.98 0 0 1 13 16.92V19h3a1 1 0 0 1 0 2H8a1 1 0 0 1 0-2h3v-2.08a6.98 6.98 0 0 1-3.85-3.98C4.24 12.52 2 10.02 2 7V4.5C2 3.67 2.67 3 3.5 3H6V2.5A1.5 1.5 0 0 1 7.5 1h9A1.5 1.5 0 0 1 18 2.5V3zM6 5H4v2c0 1.66 1.02 3.08 2.46 3.68A7.4 7.4 0 0 1 6 8.1V5zm12 3.1c0 .9-.16 1.77-.46 2.58A4 4 0 0 0 20 7V5h-2v3.1z"/>

              </span>
              <span class="btn-label">INFO TOURNAMENT TOPUPCUAN</span>
            </a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const characters = [
      "https://raw.githubusercontent.com/jordanbuchman/steamoji/master/games/ONE%20PIECE%20PIRATE%20WARRIORS%203/images/MonkeyDLuffy.png",
      "https://raw.githubusercontent.com/jordanbuchman/steamoji/master/games/ONE%20PIECE%20PIRATE%20WARRIORS%203/images/RoronoaZoro.png",
      "https://raw.githubusercontent.com/jordanbuchman/steamoji/master/games/ONE%20PIECE%20PIRATE%20WARRIORS%203/images/Nami.png",
      "https://raw.githubusercontent.com/jordanbuchman/steamoji/master/games/ONE%20PIECE%20PIRATE%20WARRIORS%203/images/Sanji.png",
      "https://raw.githubusercontent.com/jordanbuchman/steamoji/master/games/ONE%20PIECE%20PIRATE%20WARRIORS%203/images/TonyTonyChopper.png",
      "https://raw.githubusercontent.com/jordanbuchman/steamoji/master/games/ONE%20PIECE%20PIRATE%20WARRIORS%203/images/NicoRobin.png",
      "https://raw.githubusercontent.com/jordanbuchman/steamoji/master/games/ONE%20PIECE%20PIRATE%20WARRIORS%203/images/FrankyOPPW3.png",
      "https://raw.githubusercontent.com/jordanbuchman/steamoji/master/games/ONE%20PIECE%20PIRATE%20WARRIORS%203/images/Brook.png"
    ];

    const bgCharacters = document.getElementById("bgCharacters");
    const goldParticles = document.getElementById("goldParticles");
    const sparkles = document.getElementById("sparkles");
    const subscriberRoller = document.getElementById("subscriberRoller");

    const mobileQuery = window.matchMedia("(max-width: 768px)");
    let charactersCreated = false;
    let particlesCreated = false;
    let sparklesCreated = false;
    let resizeTimer = null;

    function isMobileView() {
      return mobileQuery.matches || window.innerWidth <= 768;
    }

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function shuffleArray(arr) {
      const newArr = [...arr];

      for (let i = newArr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
      }

      return newArr;
    }

    function formatNumber(num) {
      return num.toLocaleString("en-US");
    }

    function createGoldParticles() {
      if (isMobileView()) {
        goldParticles.innerHTML = "";
        particlesCreated = false;
        return;
      }

      if (particlesCreated) {
        return;
      }

      particlesCreated = true;

      const total = 74;

      for (let i = 0; i < total; i++) {
        const p = document.createElement("span");
        p.className = "particle";

        const size = random(2, 8);

        p.style.width = size + "px";
        p.style.height = size + "px";
        p.style.left = random(0, 100) + "%";
        p.style.top = random(28, 100) + "%";
        p.style.animationDuration = random(4.5, 10) + "s";
        p.style.animationDelay = random(0, 8) + "s";
        p.style.setProperty("--drift-x", random(-30, 30) + "px");

        goldParticles.appendChild(p);
      }
    }

    function createSparkles() {
      if (isMobileView()) {
        sparkles.innerHTML = "";
        sparklesCreated = false;
        return;
      }

      if (sparklesCreated) {
        return;
      }

      sparklesCreated = true;

      const total = 58;

      for (let i = 0; i < total; i++) {
        const s = document.createElement("span");
        s.className = "spark";

        s.style.left = random(0, 100) + "%";
        s.style.top = random(24, 100) + "%";
        s.style.animationDuration = random(3.2, 6.2) + "s";
        s.style.animationDelay = random(0, 5) + "s";

        sparkles.appendChild(s);
      }
    }

    function createCharacters() {
      if (isMobileView()) {
        bgCharacters.innerHTML = "";
        charactersCreated = false;
        return;
      }

      if (charactersCreated) {
        return;
      }

      charactersCreated = true;

      const total = 44;
      const pool = shuffleArray(characters);

      for (let i = 0; i < total; i++) {
        const wrap = document.createElement("div");
        wrap.className = "char";

        const move = document.createElement("span");
        move.className = "char-move";

        const img = document.createElement("img");
        img.src = pool[i % pool.length];
        img.alt = "Character";
        img.loading = "lazy";

        img.onerror = function () {
          wrap.remove();
        };

        const size = random(72, 165);
        const left = random(0, 92);
        const top = random(2, 88);
        const fadeDur = random(5.2, 9.2);
        const sideDur = random(4.5, 8.5);
        const maxOpacity = random(0.24, 0.48);
        const driftAmp = random(6, 18) + "px";
        const sideAmp = random(5, 22) + "px";

        wrap.style.width = size + "px";
        wrap.style.left = left + "%";
        wrap.style.top = top + "%";
        wrap.style.animationDelay = random(0, 6) + "s";
        wrap.style.setProperty("--fadeDur", fadeDur + "s");
        wrap.style.setProperty("--sideDur", sideDur + "s");
        wrap.style.setProperty("--maxOpacity", maxOpacity);
        wrap.style.setProperty("--driftAmp", driftAmp);
        wrap.style.setProperty("--sideAmp", sideAmp);

        img.style.opacity = random(0.68, 0.88);

        move.appendChild(img);
        wrap.appendChild(move);
        bgCharacters.appendChild(wrap);
      }
    }

    let rollerSlots = [];
    let rollerPattern = "";

    function buildRoller(pattern) {
      subscriberRoller.innerHTML = "";
      rollerSlots = [];
      rollerPattern = pattern;

      const chars = pattern.split("");

      chars.forEach((char) => {
        if (/\d/.test(char)) {
          const slot = document.createElement("span");
          slot.className = "odo-digit";

          const strip = document.createElement("span");
          strip.className = "odo-strip";

          for (let i = 0; i < 40; i++) {
            const digit = document.createElement("span");
            digit.textContent = i % 10;
            strip.appendChild(digit);
          }

          slot.appendChild(strip);
          subscriberRoller.appendChild(slot);

          rollerSlots.push({
            type: "digit",
            strip,
            currentIndex: 0
          });
        } else {
          const sep = document.createElement("span");
          sep.className = "odo-sep";
          sep.textContent = char;
          subscriberRoller.appendChild(sep);

          rollerSlots.push({
            type: "sep"
          });
        }
      });
    }

    function ensureRollerPattern(numString) {
      const pattern = numString.replace(/\d/g, "0");

      if (!rollerPattern || rollerPattern !== pattern) {
        buildRoller(pattern);
      }
    }

    function setRollingNumber(num, immediate = false) {
      const text = formatNumber(num);
      ensureRollerPattern(text);

      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        const slot = rollerSlots[i];

        if (!slot || slot.type !== "digit") {
          continue;
        }

        const targetDigit = parseInt(ch, 10);

        if (immediate) {
          slot.currentIndex = targetDigit;
          slot.strip.style.transition = "none";
          slot.strip.style.transform = `translateY(calc(var(--odo-h) * -${slot.currentIndex}))`;

          requestAnimationFrame(() => {
            slot.strip.style.transition = "";
          });
        } else {
          const currentDigit = slot.currentIndex % 10;
          let delta = (targetDigit - currentDigit + 10) % 10;

          if (delta === 0) {
            delta = 10;
          }

          delta += randomInt(0, 2);
          slot.currentIndex += delta;

          if (slot.currentIndex > 34) {
            slot.currentIndex = (slot.currentIndex % 10) + 20;
          }

          slot.strip.style.transform = `translateY(calc(var(--odo-h) * -${slot.currentIndex}))`;
        }
      }
    }

    function getInitialSubscriberCount() {
      const storageKey = "topupcuan_subscribers";
      const storageTimeKey = "topupcuan_subscribers_time";

      const savedCount = parseInt(localStorage.getItem(storageKey), 10);
      const savedTime = parseInt(localStorage.getItem(storageTimeKey), 10);
      const now = Date.now();

      if (!isNaN(savedCount) && !isNaN(savedTime)) {
        const minutesPassed = (now - savedTime) / (1000 * 60);
        let adjusted = savedCount;

        if (minutesPassed < 2) {
          adjusted += randomInt(0, 3);
        } else if (minutesPassed < 30) {
          adjusted += randomInt(1, 12);
        } else if (minutesPassed < 180) {
          adjusted += randomInt(5, 28);
        } else {
          adjusted += randomInt(10, 60);
        }

        localStorage.setItem(storageKey, adjusted);
        localStorage.setItem(storageTimeKey, now);

        return adjusted;
      }

      const start = randomInt(4200, 7999);

      localStorage.setItem(storageKey, start);
      localStorage.setItem(storageTimeKey, now);

      return start;
    }

    function startLiveSubscribers() {
      const storageKey = "topupcuan_subscribers";
      const storageTimeKey = "topupcuan_subscribers_time";

      let count = getInitialSubscriberCount();

      setRollingNumber(count, true);

      function loop() {
        const roll = Math.random();

        if (roll < 0.54) {
          count += randomInt(1, 3);
        } else if (roll < 0.78) {
          count += 0;
        } else if (roll < 0.90) {
          count += randomInt(2, 6);
        } else if (roll < 0.96) {
          count -= 1;
        } else {
          count += randomInt(5, 10);
        }

        if (count < 1000) {
          count = 1000;
        }

        setRollingNumber(count, false);

        localStorage.setItem(storageKey, count);
        localStorage.setItem(storageTimeKey, Date.now());

        const nextDelay = randomInt(1800, 5200);
        setTimeout(loop, nextDelay);
      }

      setTimeout(loop, randomInt(1400, 2600));
    }

    function handleResponsiveBackgroundEffects() {
      clearTimeout(resizeTimer);

      resizeTimer = setTimeout(() => {
        if (isMobileView()) {
          bgCharacters.innerHTML = "";
          goldParticles.innerHTML = "";
          sparkles.innerHTML = "";
          charactersCreated = false;
          particlesCreated = false;
          sparklesCreated = false;
          return;
        }

        createGoldParticles();
        createSparkles();
        createCharacters();
      }, 160);
    }

    window.addEventListener("resize", handleResponsiveBackgroundEffects, { passive: true });

    createGoldParticles();
    createSparkles();
    createCharacters();
    startLiveSubscribers();
  </script>
</body>
