<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050300" />
  <title>TOPUPCUAN.COM - Telegram Group</title>

  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --gold-1: #fff8d0;
      --gold-2: #ffe58a;
      --gold-3: #ffc642;
      --gold-4: #f0a900;
      --dark-1: #030200;
      --dark-2: #0c0700;
      --dark-3: #171004;
      --panel: rgba(16, 11, 3, 0.94);
      --line: rgba(255, 226, 142, 0.34);
      --text-soft: rgba(255, 255, 255, 0.82);
    }

    html {
      width: 100%;
      min-height: 100%;
      background: var(--dark-1);
    }

    body {
      width: 100%;
      min-height: 100dvh;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 18% 8%, rgba(255, 202, 55, 0.18), transparent 28%),
        radial-gradient(circle at 84% 18%, rgba(255, 179, 0, 0.14), transparent 30%),
        radial-gradient(circle at 50% 105%, rgba(255, 205, 82, 0.14), transparent 34%),
        linear-gradient(145deg, var(--dark-1) 0%, var(--dark-2) 46%, var(--dark-3) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(115deg, transparent 0%, rgba(255, 227, 140, 0.055) 43%, transparent 72%),
        repeating-linear-gradient(135deg, rgba(255, 218, 111, 0.026) 0 1px, transparent 1px 14px);
      opacity: 0.72;
      transform: translate3d(0, 0, 0);
      animation: softSheen 12s linear infinite;
    }

    @keyframes softSheen {
      from { transform: translate3d(-42px, 0, 0); }
      to { transform: translate3d(42px, 0, 0); }
    }

    .topbar {
      position: relative;
      z-index: 3;
      width: 100%;
      min-height: 62px;
      padding: 10px max(14px, env(safe-area-inset-left)) 10px max(14px, env(safe-area-inset-right));
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: rgba(0, 0, 0, 0.88);
      border-bottom: 1px solid rgba(255, 218, 111, 0.20);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.30);
    }

    .brand {
      min-width: 0;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: inherit;
      text-decoration: none;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, var(--gold-1), var(--gold-2), var(--gold-4));
      border: 1px solid rgba(255, 255, 255, 0.42);
      box-shadow: 0 0 16px rgba(255, 190, 38, 0.22);
      overflow: hidden;
    }

    .brand-mark img {
      width: 28px;
      height: 28px;
      object-fit: contain;
      display: block;
    }

    .brand-text {
      min-width: 0;
      display: grid;
      gap: 2px;
      text-align: left;
    }

    .brand-name {
      color: #fff3bc;
      font-size: 18px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0.2px;
      white-space: nowrap;
      text-shadow: 0 0 12px rgba(255, 190, 38, 0.20);
    }

    .brand-sub {
      color: rgba(255, 255, 255, 0.62);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.1px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .topup-btn {
      min-height: 38px;
      padding: 0 16px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #1b1200;
      text-decoration: none;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
      background: linear-gradient(135deg, var(--gold-1), var(--gold-2) 38%, var(--gold-3) 70%, var(--gold-4));
      border: 1px solid rgba(255, 255, 255, 0.46);
      box-shadow:
        0 8px 16px rgba(0, 0, 0, 0.24),
        0 0 14px rgba(255, 190, 38, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.62);
      touch-action: manipulation;
    }

    .page {
      position: relative;
      z-index: 2;
      min-height: calc(100dvh - 62px);
      padding: 30px 14px calc(28px + env(safe-area-inset-bottom));
      display: grid;
      place-items: start center;
    }

    .card {
      position: relative;
      width: min(468px, 100%);
      padding: 31px 18px 24px;
      border-radius: 24px;
      text-align: center;
      overflow: hidden;
      isolation: isolate;
      contain: layout paint style;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.085), rgba(255, 255, 255, 0.025)),
        linear-gradient(135deg, rgba(255, 224, 125, 0.070), transparent 42%),
        var(--panel);
      border: 1px solid var(--line);
      box-shadow:
        0 18px 42px rgba(0, 0, 0, 0.44),
        0 0 0 1px rgba(255, 255, 255, 0.03),
        inset 0 1px 0 rgba(255, 255, 255, 0.14);
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 225, 130, 0.18), transparent 38%),
        linear-gradient(120deg, transparent 18%, rgba(255, 255, 255, 0.08) 45%, transparent 68%);
      opacity: 0.72;
    }

    .card::after {
      content: "";
      position: absolute;
      left: 16px;
      right: 16px;
      top: 12px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 247, 205, 0.68), transparent);
      opacity: 0.74;
    }

    .group-icon-wrap {
      width: 112px;
      height: 112px;
      margin: 0 auto 18px;
      border-radius: 50%;
      padding: 15px;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, rgba(255, 247, 205, 0.18), rgba(255, 179, 0, 0.09));
      border: 1px solid rgba(255, 230, 142, 0.27);
    }

    .group-icon {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      object-fit: contain;
      display: block;
      padding: 12px;
      background: linear-gradient(135deg, var(--gold-1), var(--gold-2), var(--gold-4));
      border: 2px solid rgba(255, 255, 255, 0.42);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.55);
    }

    h1 {
      margin-bottom: 10px;
      color: #fff5c4;
      font-size: clamp(25px, 7vw, 31px);
      font-weight: 900;
      line-height: 1.1;
      letter-spacing: 0.2px;
      text-shadow: 0 0 14px rgba(255, 190, 38, 0.20);
    }

    .tagline {
      max-width: 340px;
      margin: 0 auto 16px;
      color: rgba(255, 255, 255, 0.76);
      font-size: 13px;
      font-weight: 600;
      line-height: 1.45;
    }

    .subs {
      margin: 0 auto 24px;
      padding: 8px 12px;
      width: fit-content;
      max-width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      color: var(--text-soft);
      font-size: 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid rgba(255, 230, 142, 0.13);
    }

    .subscriber-number {
      color: #fff0aa;
      font-size: 19px;
      font-weight: 900;
      letter-spacing: 0.2px;
      font-variant-numeric: tabular-nums;
    }

    .action-buttons {
      width: 100%;
      display: grid;
      gap: 13px;
    }

    .action-btn {
      position: relative;
      width: 100%;
      min-height: 53px;
      padding: 0 14px;
      border-radius: 999px;
      display: grid;
      grid-template-columns: 34px 1fr 34px;
      align-items: center;
      color: #1a1000;
      text-decoration: none;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.05px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      touch-action: manipulation;
      background: linear-gradient(135deg, #fffbe3 0%, #ffe78d 32%, #ffcd45 66%, #ffb300 100%);
      border: 1px solid rgba(255, 255, 255, 0.50);
      box-shadow:
        0 10px 18px rgba(0, 0, 0, 0.23),
        0 0 15px rgba(255, 183, 0, 0.20),
        inset 0 1px 0 rgba(255, 255, 255, 0.60),
        inset 0 -2px 8px rgba(129, 76, 0, 0.20);
      transform: translate3d(0, 0, 0);
    }

    .action-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 0%, rgba(255, 255, 255, 0.55) 45%, transparent 58%);
      transform: translate3d(-125%, 0, 0);
      opacity: 0.65;
      animation: buttonSheen 4.5s ease-in-out infinite;
    }

    @keyframes buttonSheen {
      0%, 55% { transform: translate3d(-125%, 0, 0); opacity: 0; }
      68% { opacity: 0.65; }
      85%, 100% { transform: translate3d(125%, 0, 0); opacity: 0; }
    }

    .action-btn:active,
    .topup-btn:active {
      transform: scale(0.985);
    }

    .btn-icon,
    .btn-label {
      position: relative;
      z-index: 1;
    }

    .btn-icon {
      grid-column: 1;
      justify-self: center;
      width: 28px;
      height: 28px;
      min-width: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(20, 13, 0, 0.13);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
    }

    .btn-icon svg {
      width: 18px;
      height: 18px;
      display: block;
    }

    .btn-label {
      grid-column: 2;
      justify-self: center;
      width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1;
    }

    .youtube-btn .btn-icon {
      background: linear-gradient(135deg, #ff3131, #b90000);
    }

    .telegram-btn .btn-icon {
      background: linear-gradient(135deg, #41c8ff, #1588d6);
    }

    .info-btn .btn-icon {
      background: linear-gradient(135deg, #fff1a0, #ffb300);
    }

    .youtube-btn .btn-icon svg,
    .telegram-btn .btn-icon svg {
      fill: #fff;
    }

    .info-btn .btn-icon svg {
      fill: #211600;
    }

    .footer-note {
      margin-top: 18px;
      color: rgba(255, 255, 255, 0.48);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.7px;
      text-transform: uppercase;
    }

    @media (hover: hover) and (pointer: fine) {
      .action-btn,
      .topup-btn {
        transition: transform 180ms ease, box-shadow 180ms ease;
      }

      .action-btn:hover,
      .topup-btn:hover {
        transform: translateY(-2px);
      }
    }

    @media (max-width: 520px) {
      body::before {
        animation: none;
        opacity: 0.42;
      }

      .topbar {
        min-height: 58px;
        padding-top: 9px;
        padding-bottom: 9px;
      }

      .brand-mark {
        width: 34px;
        height: 34px;
      }

      .brand-mark img {
        width: 25px;
        height: 25px;
      }

      .brand-name {
        font-size: 16px;
      }

      .brand-sub {
        font-size: 9px;
        letter-spacing: 0.8px;
      }

      .topup-btn {
        min-height: 35px;
        padding: 0 12px;
        font-size: 10.6px;
        box-shadow:
          0 7px 13px rgba(0, 0, 0, 0.22),
          0 0 10px rgba(255, 190, 38, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.55);
      }

      .page {
        min-height: calc(100dvh - 58px);
        padding: 22px 12px 22px;
      }

      .card {
        border-radius: 22px;
        padding: 26px 14px 22px;
        box-shadow:
          0 14px 30px rgba(0, 0, 0, 0.38),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
      }

      .group-icon-wrap {
        width: 100px;
        height: 100px;
        padding: 13px;
        margin-bottom: 16px;
      }

      .group-icon {
        width: 74px;
        height: 74px;
        padding: 11px;
      }

      .tagline {
        font-size: 12.5px;
        margin-bottom: 14px;
      }

      .subs {
        margin-bottom: 21px;
        font-size: 13px;
      }

      .subscriber-number {
        font-size: 18px;
      }

      .action-buttons {
        gap: 12px;
      }

      .action-btn {
        min-height: 50px;
        padding: 0 10px;
        grid-template-columns: 31px 1fr 31px;
        font-size: 11.3px;
        box-shadow:
          0 8px 15px rgba(0, 0, 0, 0.22),
          0 0 11px rgba(255, 183, 0, 0.16),
          inset 0 1px 0 rgba(255, 255, 255, 0.55),
          inset 0 -2px 7px rgba(129, 76, 0, 0.18);
      }

      .action-btn::before {
        animation-duration: 6.2s;
        opacity: 0.42;
      }

      .btn-icon {
        width: 26px;
        height: 26px;
        min-width: 26px;
      }

      .btn-icon svg {
        width: 17px;
        height: 17px;
      }

      .footer-note {
        font-size: 10px;
        margin-top: 16px;
      }
    }

    @media (max-width: 360px) {
      .brand-sub {
        display: none;
      }

      .brand-name {
        font-size: 15px;
      }

      .topup-btn {
        padding: 0 10px;
        font-size: 10px;
      }

      .action-btn {
        font-size: 10.5px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="https://topupcuan.com/" target="_blank" rel="noopener" aria-label="TOPUPCUAN.COM">
      <span class="brand-mark">
        <img src="https://topupcuan.com/favicon.ico" alt="" onerror="this.onerror=null;this.src='https://www.google.com/s2/favicons?domain=topupcuan.com&sz=128';" />
      </span>
      <span class="brand-text">
        <span class="brand-name">TOPUPCUAN</span>
        <span class="brand-sub">Official Community</span>
      </span>
    </a>

    <a class="topup-btn" href="https://topupcuan.com/" target="_blank" rel="noopener">
      TOPUP SEKARANG
    </a>
  </header>

  <main class="page">
    <section class="card" aria-label="TOPUPCUAN Telegram Group">
      <div class="group-icon-wrap">
        <img
          class="group-icon"
          src="https://topupcuan.com/favicon.ico"
          onerror="this.onerror=null;this.src='https://www.google.com/s2/favicons?domain=topupcuan.com&sz=256';"
          alt="TOPUPCUAN"
          loading="eager"
          decoding="async"
        />
      </div>

      <h1>TOPUPCUAN.COM</h1>
      <p class="tagline">Join komunitas resmi TOPUPCUAN untuk info terbaru, promo, dan update tournament.</p>

      <div class="subs" aria-live="polite">
        <span class="subscriber-number" id="subscriberNumber">5,888</span>
        <span>subscribers</span>
      </div>

      <div class="action-buttons">
        <a class="action-btn telegram-btn" href="tg://join?invite=tasc9CEInas0ZjBl">
          <span class="btn-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M21.94 4.16c.3-1.22-.88-1.74-1.75-1.38L2.7 9.9c-1.2.48-1.18 1.16-.2 1.47l4.48 1.4L17.36 6.2c.5-.3.94-.13.57.2L9.52 14l-.32 4.78c.47 0 .68-.22.94-.48l2.26-2.2 4.7 3.48c.87.48 1.49.23 1.7-.8l3.14-14.62z"/>
            </svg>
          </span>
          <span class="btn-label">JOIN GROUP TELEGRAM</span>
        </a>

        <a class="action-btn youtube-btn" href="https://www.youtube.com/@topupcuanofficial" target="_blank" rel="noopener">
          <span class="btn-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M23.5 6.2s-.23-1.65-.95-2.38c-.91-.95-1.94-.96-2.41-1.01C16.78 2.56 12 2.56 12 2.56h-.01s-4.78 0-8.14.25c-.47.05-1.5.06-2.41 1.01C.72 4.55.5 6.2.5 6.2S.26 8.13.26 10.06v1.82c0 1.93.24 3.86.24 3.86s.23 1.65.95 2.38c.91.95 2.1.92 2.63 1.02 1.91.18 7.92.24 7.92.24s4.78-.01 8.14-.26c.47-.05 1.5-.06 2.41-1.01.72-.73.95-2.38.95-2.38s.24-1.93.24-3.86v-1.82c0-1.93-.24-3.86-.24-3.86zM9.68 14.15V7.46l6.16 3.36-6.16 3.33z"/>
            </svg>
          </span>
          <span class="btn-label">YOUTUBE TOPUPCUAN</span>
        </a>

        <a class="action-btn info-btn" href="https://topupcuan.com/blog" target="_blank" rel="noopener">
          <span class="btn-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M18 3h2.5c.83 0 1.5.67 1.5 1.5V7c0 3.02-2.24 5.52-5.15 5.94A6.98 6.98 0 0 1 13 16.92V19h3a1 1 0 0 1 0 2H8a1 1 0 0 1 0-2h3v-2.08a6.98 6.98 0 0 1-3.85-3.98C4.24 12.52 2 10.02 2 7V4.5C2 3.67 2.67 3 3.5 3H6V2.5A1.5 1.5 0 0 1 7.5 1h9A1.5 1.5 0 0 1 18 2.5V3zM6 5H4v2c0 1.66 1.02 3.08 2.46 3.68A7.4 7.4 0 0 1 6 8.1V5zm12 3.1c0 .9-.16 1.77-.46 2.58A4 4 0 0 0 20 7V5h-2v3.1z"/>
            </svg>
          </span>
          <span class="btn-label">INFO TOURNAMENT</span>
        </a>
      </div>

      <div class="footer-note">Fast Mobile • Premium Look</div>
    </section>
  </main>

  <script>
    const subscriberNumber = document.getElementById("subscriberNumber");
    const storageKey = "topupcuan_subscribers_premium_light";
    const storageTimeKey = "topupcuan_subscribers_premium_light_time";

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function formatNumber(num) {
      return num.toLocaleString("en-US");
    }

    function getInitialCount() {
      const saved = parseInt(localStorage.getItem(storageKey), 10);
      const savedTime = parseInt(localStorage.getItem(storageTimeKey), 10);
      const now = Date.now();

      if (!Number.isNaN(saved) && !Number.isNaN(savedTime)) {
        const minutesPassed = (now - savedTime) / 60000;
        const add = minutesPassed < 10 ? randomInt(0, 4) : randomInt(4, 22);
        const next = Math.max(1000, saved + add);
        localStorage.setItem(storageKey, String(next));
        localStorage.setItem(storageTimeKey, String(now));
        return next;
      }

      const start = randomInt(4800, 8999);
      localStorage.setItem(storageKey, String(start));
      localStorage.setItem(storageTimeKey, String(now));
      return start;
    }

    let count = getInitialCount();
    subscriberNumber.textContent = formatNumber(count);

    function updateSubscribers() {
      if (document.hidden) return;

      const roll = Math.random();
      if (roll < 0.68) count += randomInt(1, 3);
      else if (roll < 0.88) count += randomInt(0, 1);
      else count += randomInt(4, 8);

      subscriberNumber.textContent = formatNumber(count);
      localStorage.setItem(storageKey, String(count));
      localStorage.setItem(storageTimeKey, String(Date.now()));
    }

    setInterval(updateSubscribers, 6500);
  </script>
</body>
</html>
