
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>TOPUPCUAN.COM - Telegram Group</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold-1: #fff6bf;
      --gold-2: #ffe07a;
      --gold-3: #ffcb47;
      --gold-4: #ffb300;
      --bg-1: #020202;
      --bg-2: #0d0b03;
      --bg-3: #151103;
      --odo-h: 24px;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: #fff;
      background:
        radial-gradient(circle at 15% 15%, rgba(255, 214, 90, 0.18), transparent 30%),
        radial-gradient(circle at 85% 20%, rgba(255, 179, 0, 0.16), transparent 30%),
        radial-gradient(circle at 50% 100%, rgba(255, 214, 90, 0.16), transparent 35%),
        linear-gradient(135deg, var(--bg-1) 0%, var(--bg-2) 45%, var(--bg-3) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        repeating-linear-gradient(
          45deg,
          rgba(255, 220, 120, 0.018) 0px,
          rgba(255, 220, 120, 0.018) 1px,
          transparent 1px,
          transparent 10px
        ),
        linear-gradient(
          120deg,
          transparent,
          rgba(255, 220, 120, 0.04),
          transparent
        );
      animation: bodySheen 10s linear infinite;
    }

    @keyframes bodySheen {
      0% { transform: translateX(-60px); }
      100% { transform: translateX(60px); }
    }

    .topbar {
      position: relative;
      z-index: 30;
      height: 62px;
      padding: 8px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0, 0, 0, 0.86);
      border-bottom: 1px solid rgba(255, 218, 111, 0.22);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow:
        0 0 20px rgba(255, 179, 0, 0.22),
        inset 0 -1px 0 rgba(255, 255, 255, 0.04);
    }

    .brand-logo {
      width: 145px;
      height: 46px;
      object-fit: contain;
      display: block;
      border-radius: 0;
      filter:
        drop-shadow(0 0 10px rgba(255, 220, 120, 0.55))
        drop-shadow(0 0 24px rgba(255, 179, 0, 0.35));
    }

    .topup-btn {
      position: relative;
      min-height: 38px;
      padding: 0 20px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #1b1400;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.25px;
      background: linear-gradient(135deg, var(--gold-1), var(--gold-2) 30%, var(--gold-3) 65%, var(--gold-4));
      border: 1px solid rgba(255, 255, 255, 0.45);
      box-shadow:
        0 0 14px rgba(255, 214, 90, 0.6),
        0 0 34px rgba(255, 179, 0, 0.32),
        inset 0 0 12px rgba(255, 255, 255, 0.45);
      overflow: hidden;
      animation: btnSmallPulse 1.8s ease-in-out infinite alternate;
    }

    .topup-btn::before,
    .action-btn::before {
      content: "";
      position: absolute;
      top: -140%;
      left: -70%;
      width: 48%;
      height: 340%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.98), transparent);
      transform: rotate(25deg);
      animation: btnShine 2.15s infinite;
      z-index: 1;
    }

    .topup-btn::after,
    .action-btn::after {
      content: "";
      position: absolute;
      inset: 3px;
      border-radius: inherit;
      border: 1px solid rgba(255, 255, 255, 0.32);
      pointer-events: none;
      z-index: 2;
    }

    @keyframes btnShine {
      0% { left: -70%; opacity: 0; }
      22% { opacity: 1; }
      55% { left: 130%; opacity: 0; }
      100% { left: 130%; opacity: 0; }
    }

    @keyframes btnSmallPulse {
      from { transform: scale(1); }
      to { transform: scale(1.04); }
    }

    .orb {
      position: fixed;
      pointer-events: none;
      z-index: 1;
      border-radius: 50%;
      filter: blur(18px);
      opacity: 0.75;
      animation: orbMove 8s ease-in-out infinite alternate;
    }

    .orb1 {
      width: 300px;
      height: 300px;
      left: -110px;
      top: 120px;
      background: radial-gradient(circle, rgba(255, 214, 90, 0.28), transparent 68%);
    }

    .orb2 {
      width: 360px;
      height: 360px;
      right: -130px;
      bottom: 40px;
      background: radial-gradient(circle, rgba(255, 179, 0, 0.22), transparent 68%);
      animation-delay: 1.7s;
    }

    .orb3 {
      width: 220px;
      height: 220px;
      left: 40%;
      top: 72%;
      background: radial-gradient(circle, rgba(255, 232, 140, 0.15), transparent 68%);
      animation-delay: 0.9s;
    }

    @keyframes orbMove {
      from { transform: translateY(0) scale(1); }
      to { transform: translateY(70px) scale(1.15); }
    }

    .gold-particles,
    .bg-characters,
    .sparkles {
      position: fixed;
      inset: 62px 0 0 0;
      overflow: hidden;
      pointer-events: none;
    }

    .gold-particles { z-index: 2; }
    .bg-characters { z-index: 3; }
    .sparkles { z-index: 4; }

    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: particleFloat linear infinite;
      background: radial-gradient(
        circle,
        rgba(255, 245, 180, 0.95),
        rgba(255, 195, 60, 0.65) 45%,
        rgba(255, 179, 0, 0.08) 75%,
        transparent 100%
      );
      box-shadow:
        0 0 6px rgba(255, 232, 135, 0.7),
        0 0 18px rgba(255, 179, 0, 0.35);
    }

    @keyframes particleFloat {
      0% {
        transform: translate3d(0, 0, 0) scale(0.55);
        opacity: 0;
      }
      12% { opacity: 0.7; }
      80% { opacity: 0.45; }
      100% {
        transform: translate3d(var(--drift-x), -220px, 0) scale(1.1);
        opacity: 0;
      }
    }

    .spark {
      position: absolute;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      opacity: 0;
      background: #fff0a5;
      box-shadow:
        0 0 10px #ffe07a,
        0 0 22px #ffb300;
      animation: sparkRise linear infinite;
    }

    @keyframes sparkRise {
      0% {
        transform: translateY(0) scale(0.5);
        opacity: 0;
      }
      18% { opacity: 1; }
      100% {
        transform: translateY(-170px) scale(1.25);
        opacity: 0;
      }
    }

    .char {
      position: absolute;
      opacity: 0;
      animation:
        charFade var(--fadeDur) ease-in-out infinite,
        charDrift calc(var(--fadeDur) + 2s) ease-in-out infinite alternate;
      will-change: transform, opacity;
      filter:
        drop-shadow(0 0 10px rgba(255, 222, 130, 0.7))
        drop-shadow(0 0 24px rgba(255, 179, 0, 0.28));
    }

    .char-move {
      display: block;
      width: 100%;
      animation: charSide var(--sideDur) ease-in-out infinite alternate;
    }

    .char img {
      display: block;
      width: 100%;
      height: auto;
      object-fit: contain;
      opacity: 0.88;
      animation: charBob calc(var(--fadeDur) - 0.6s) ease-in-out infinite alternate;
      transform-origin: center center;
    }

    @keyframes charFade {
      0% {
        opacity: 0;
        transform: scale(0.72) translateY(26px) rotate(-5deg);
      }
      18% { opacity: 0.16; }
      42% {
        opacity: var(--maxOpacity);
        transform: scale(1) translateY(0) rotate(2deg);
      }
      72% { opacity: calc(var(--maxOpacity) * 0.65); }
      100% {
        opacity: 0;
        transform: scale(0.8) translateY(-24px) rotate(-4deg);
      }
    }

    @keyframes charDrift {
      from { margin-left: calc(var(--driftAmp) * -1); }
      to { margin-left: var(--driftAmp); }
    }

    @keyframes charBob {
      from { transform: translateY(0px) scale(1); }
      to { transform: translateY(-10px) scale(1.02); }
    }

    @keyframes charSide {
      from { transform: translateX(calc(var(--sideAmp) * -1)); }
      to { transform: translateX(var(--sideAmp)); }
    }

    .page {
      position: relative;
      z-index: 10;
      min-height: calc(100vh - 62px);
      padding: 34px 16px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .card {
      position: relative;
      width: min(490px, 100%);
      padding: 36px 24px 34px;
      border-radius: 24px;
      text-align: center;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.10), rgba(255, 255, 255, 0.04)),
        linear-gradient(180deg, rgba(255, 226, 136, 0.08), rgba(255, 204, 88, 0.02)),
        rgba(10, 10, 10, 0.44);
      border: 1px solid rgba(255, 225, 130, 0.26);
      box-shadow:
        0 10px 40px rgba(0, 0, 0, 0.45),
        0 0 24px rgba(255, 210, 94, 0.16),
        0 0 70px rgba(255, 179, 0, 0.10),
        inset 0 1px 0 rgba(255, 255, 255, 0.18),
        inset 0 0 20px rgba(255, 220, 120, 0.05);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      overflow: hidden;
      animation: cardGlow 2.8s ease-in-out infinite alternate;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.18), transparent 22%),
        radial-gradient(circle at top left, rgba(255, 242, 190, 0.15), transparent 35%);
      pointer-events: none;
      z-index: 0;
    }

    .card::after {
      content: "";
      position: absolute;
      left: 12px;
      right: 12px;
      top: 10px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.55), transparent);
      pointer-events: none;
      z-index: 0;
    }

    @keyframes cardGlow {
      from {
        box-shadow:
          0 10px 40px rgba(0, 0, 0, 0.45),
          0 0 22px rgba(255, 210, 94, 0.14),
          0 0 58px rgba(255, 179, 0, 0.08),
          inset 0 1px 0 rgba(255, 255, 255, 0.16),
          inset 0 0 18px rgba(255, 220, 120, 0.04);
      }
      to {
        box-shadow:
          0 12px 46px rgba(0, 0, 0, 0.50),
          0 0 32px rgba(255, 221, 125, 0.26),
          0 0 90px rgba(255, 179, 0, 0.16),
          inset 0 1px 0 rgba(255, 255, 255, 0.20),
          inset 0 0 26px rgba(255, 220, 120, 0.08);
      }
    }

    .card-content {
      position: relative;
      z-index: 2;
    }

    .group-icon-wrap {
      width: 128px;
      height: 128px;
      margin: 0 auto 20px;
      border-radius: 50%;
      padding: 18px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0.10));
      border: 1px solid rgba(255, 255, 255, 0.26);
      box-shadow:
        0 0 16px rgba(255, 226, 136, 0.20),
        0 0 40px rgba(255, 179, 0, 0.16),
        inset 0 1px 0 rgba(255, 255, 255, 0.24);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .group-icon {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      padding: 14px;
      object-fit: contain;
      background: linear-gradient(135deg, var(--gold-1), var(--gold-2), var(--gold-4));
      border: 2px solid rgba(255, 255, 255, 0.42);
      box-shadow:
        0 0 18px rgba(255, 218, 111, 0.50),
        0 0 42px rgba(255, 179, 0, 0.22),
        inset 0 0 14px rgba(255, 255, 255, 0.40);
    }

    h1 {
      font-size: 27px;
      font-weight: 900;
      letter-spacing: 0.35px;
      margin-bottom: 10px;
      color: #fff8d7;
      text-shadow:
        0 0 9px rgba(255, 220, 120, 0.55),
        0 0 20px rgba(255, 179, 0, 0.22);
    }

    .subs {
      margin-bottom: 26px;
      color: rgba(255, 255, 255, 0.88);
      font-size: 15px;
      min-height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .roller {
      height: var(--odo-h);
      line-height: var(--odo-h);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 1px;
      color: #fff4be;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 0.5px;
      font-variant-numeric: tabular-nums;
      text-shadow:
        0 0 8px rgba(255, 220, 120, 0.75),
        0 0 18px rgba(255, 179, 0, 0.35);
    }

    .odo-digit {
      width: 13px;
      height: var(--odo-h);
      overflow: hidden;
      display: inline-block;
      position: relative;
    }

    .odo-strip {
      display: block;
      transition: transform 850ms cubic-bezier(0.18, 0.88, 0.24, 1);
      will-change: transform;
    }

    .odo-strip span {
      display: block;
      width: 13px;
      height: var(--odo-h);
      line-height: var(--odo-h);
      text-align: center;
      font-size: 18px;
      font-weight: 900;
    }

    .odo-sep {
      height: var(--odo-h);
      line-height: var(--odo-h);
      display: inline-block;
      padding: 0 1px;
      color: #fff4be;
      font-size: 18px;
      font-weight: 900;
    }

    .subs-label {
      opacity: 0.9;
      font-size: 15px;
      line-height: var(--odo-h);
    }

    .action-buttons {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 13px;
      align-items: center;
    }

    .action-btn-wrap {
      position: relative;
      width: min(390px, 100%);
      display: flex;
      justify-content: center;
    }

    .action-btn-wrap::before,
    .action-btn-wrap::after {
      content: "";
      position: absolute;
      inset: 50% auto auto 50%;
      transform: translate(-50%, -50%);
      border-radius: 999px;
      pointer-events: none;
    }

    .action-btn-wrap::before {
      width: 100%;
      height: 62px;
      background: radial-gradient(circle, rgba(255, 221, 125, 0.34), transparent 68%);
      filter: blur(10px);
      animation: glowBreath 1.75s ease-in-out infinite;
    }

    .action-btn-wrap::after {
      width: 100%;
      height: 54px;
      border: 1px solid rgba(255, 228, 138, 0.35);
      animation: pulseRing 1.75s ease-in-out infinite;
    }

    .action-btn {
      position: relative;
      z-index: 2;
      width: 100%;
      min-height: 50px;
      padding: 0 16px;
      border-radius: 999px;
      display: grid;
      grid-template-columns: 36px 1fr 36px;
      align-items: center;
      text-decoration: none;
      color: #1a1300;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.15px;
      text-align: center;
      white-space: nowrap;
      background:
        linear-gradient(135deg, #fffbe0 0%, #ffe78c 25%, #ffce4f 58%, #ffb300 100%);
      border: 1px solid rgba(255, 255, 255, 0.56);
      box-shadow:
        0 0 18px rgba(255, 214, 90, 0.58),
        0 0 48px rgba(255, 179, 0, 0.30),
        inset 0 0 14px rgba(255, 255, 255, 0.55),
        inset 0 -3px 8px rgba(166, 104, 0, 0.22);
      overflow: hidden;
      animation: actionPulse 1.5s ease-in-out infinite alternate;
    }

    .action-btn:hover {
      transform: translateY(-2px) scale(1.035);
      box-shadow:
        0 0 26px rgba(255, 235, 150, 0.85),
        0 0 70px rgba(255, 179, 0, 0.48),
        inset 0 0 18px rgba(255, 255, 255, 0.68);
    }

    .action-btn span,
    .action-btn svg {
      position: relative;
      z-index: 3;
    }

    .btn-icon {
      grid-column: 1;
      justify-self: center;
      width: 28px;
      height: 28px;
      min-width: 28px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(20, 13, 0, 0.13);
      box-shadow:
        0 0 10px rgba(255, 255, 255, 0.4),
        inset 0 0 9px rgba(255, 255, 255, 0.35);
      animation: none;
    }

    .btn-icon svg {
      width: 19px;
      height: 19px;
      display: block;
    }

    .btn-label {
      grid-column: 2;
      justify-self: center;
      width: 100%;
      text-align: center;
      white-space: nowrap;
      line-height: 1;
      overflow: visible;
    }

    .youtube-btn .btn-icon {
      background: linear-gradient(135deg, #ff3131, #b90000);
    }

    .telegram-btn .btn-icon {
      background: linear-gradient(135deg, #39c6ff, #1588d6);
    }

    .info-btn .btn-icon {
      background: linear-gradient(135deg, #fff1a0, #ffb300);
    }

    .youtube-btn .btn-icon svg,
    .telegram-btn .btn-icon svg {
      fill: #fff;
    }

    .info-btn .btn-icon svg {
      fill: #201400;
    }

    .info-btn {
      font-size: 12.2px;
      letter-spacing: 0;
    }



    /* Clean mode: hilangkan glow/aura di 3 tombol bawah, tapi kilatan putih tetap jalan */
    .action-btn-wrap::before,
    .action-btn-wrap::after {
      display: none;
    }

    .action-btn::before {
      display: block;
    }

    .action-btn {
      box-shadow:
        inset 0 0 8px rgba(255, 255, 255, 0.28),
        inset 0 -3px 8px rgba(166, 104, 0, 0.18);
      animation: none;
    }

    .action-btn:hover {
      transform: translateY(-1px);
      box-shadow:
        inset 0 0 8px rgba(255, 255, 255, 0.30),
        inset 0 -3px 8px rgba(166, 104, 0, 0.20);
    }

    .btn-icon {
      box-shadow: none;
      filter: none;
    }

    @keyframes actionPulse {
      from {
        transform: scale(1);
        box-shadow:
          0 0 18px rgba(255, 214, 90, 0.50),
          0 0 42px rgba(255, 179, 0, 0.24),
          inset 0 0 12px rgba(255, 255, 255, 0.48);
      }
      to {
        transform: scale(1.025);
        box-shadow:
          0 0 25px rgba(255, 226, 136, 0.78),
          0 0 68px rgba(255, 179, 0, 0.42),
          inset 0 0 18px rgba(255, 255, 255, 0.62);
      }
    }

    @keyframes glowBreath {
      0%, 100% {
        opacity: 0.55;
        transform: translate(-50%, -50%) scale(1);
      }
      50% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1.08);
      }
    }

    @keyframes pulseRing {
      0% {
        opacity: 0.75;
        transform: translate(-50%, -50%) scale(1);
      }
      70% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.13);
      }
      100% {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.16);
      }
    }

    @keyframes iconFloat {
      from {
        transform: translateY(0) rotate(-4deg) scale(1);
      }
      to {
        transform: translateY(-4px) rotate(5deg) scale(1.08);
      }
    }

    @keyframes iconGlow {
      from {
        filter: drop-shadow(0 0 4px rgba(255, 255, 255, 0.45));
      }
      to {
        filter: drop-shadow(0 0 10px rgba(255, 245, 170, 0.95));
      }
    }

    @media (max-width: 520px) {
      :root {
        --odo-h: 23px;
      }

      .topbar {
        height: 60px;
        padding: 8px 10px;
      }

      .brand-logo {
        width: 118px;
        height: 42px;
      }

      .topup-btn {
        min-height: 35px;
        padding: 0 13px;
        font-size: 11px;
      }

      .page {
        min-height: calc(100vh - 60px);
        padding-top: 30px;
      }

      .card {
        width: min(380px, 100%);
        padding: 30px 14px 30px;
        border-radius: 22px;
      }

      .group-icon-wrap {
        width: 118px;
        height: 118px;
      }

      .group-icon {
        width: 86px;
        height: 86px;
      }

      h1 {
        font-size: 24px;
      }

      .subs {
        font-size: 14px;
      }

      .roller,
      .odo-strip span,
      .odo-sep {
        font-size: 17px;
      }

      .odo-digit,
      .odo-strip span {
        width: 12px;
      }

      .action-btn-wrap {
        width: min(350px, 100%);
      }

      .action-btn {
        min-height: 48px;
        padding: 0 10px;
        grid-template-columns: 30px 1fr 30px;
        font-size: 11.5px;
        letter-spacing: 0;
      }

      .info-btn {
        font-size: 10.4px;
        letter-spacing: -0.2px;
      }

      .btn-icon {
        width: 25px;
        height: 25px;
        min-width: 25px;
      }

      .btn-icon svg {
        width: 17px;
        height: 17px;
      }

      .char {
        max-width: 125px;
      }
    }

    /* Optimasi mobile:
       karakter dan partikel background dimatikan di HP supaya halaman lebih responsif dan tidak ngelag.
       Efek utama seperti tombol dan subscriber roller tetap jalan normal. */
    @media (max-width: 768px) {
      html,
      body {
        width: 100%;
        min-height: 100dvh;
      }

      body {
        overflow-x: hidden;
        -webkit-text-size-adjust: 100%;
        touch-action: manipulation;
      }

      .bg-characters,
      .gold-particles,
      .sparkles {
        display: none !important;
      }

      .char,
      .char-move,
      .char img,
      .particle,
      .spark {
        animation: none !important;
        display: none !important;
      }

      .page {
        min-height: calc(100dvh - 60px);
        padding: 22px 12px max(24px, env(safe-area-inset-bottom));
        align-items: center;
      }

      .card {
        width: min(100%, 390px);
        max-width: 100%;
      }

      .action-btn,

    .odo-strip {

    .action-btn:focus-visible,

    @media (max-width: 768px) {

    @media (max-width: 390px) {

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }

      .odo-strip {
        transition-duration: 180ms !important;
      }
    }

  <script>
    "use strict";

    const characters = [
      "https://raw.githubusercontent.com/jordanbuchman/steamoji/master/games/ONE%20PIECE%20PIRATE%20WARRIORS%203/images/MonkeyDLuffy.png",
      "https://raw.githubusercontent.com/jordanbuchman/steamoji/master/games/ONE%20PIECE%20PIRATE%20WARRIORS%203/images/RoronoaZoro.png",
      "https://raw.githubusercontent.com/jordanbuchman/steamoji/master/games/ONE%20PIECE%20PIRATE%20WARRIORS%203/images/Nami.png",
      "https://raw.githubusercontent.com/jordanbuchman/steamoji/master/games/ONE%20PIECE%20PIRATE%20WARRIORS%203/images/Sanji.png",
      "https://raw.githubusercontent.com/jordanbuchman/steamoji/master/games/ONE%20PIECE%20PIRATE%20WARRIORS%203/images/TonyTonyChopper.png",
      "https://raw.githubusercontent.com/jordanbuchman/steamoji/master/games/ONE%20PIECE%20PIRATE%20WARRIORS%203/images/NicoRobin.png",
      "https://raw.githubusercontent.com/jordanbuchman/steamoji/master/games/ONE%20PIECE%20PIRATE%20WARRIORS%203/images/FrankyOPPW3.png",
      "https://raw.githubusercontent.com/jordanbuchman/steamoji/master/games/ONE%20PIECE%20PIRATE%20WARRIORS%203/images/Brook.png"
    ];

    const CONFIG = Object.freeze({
      storageKey: "topupcuan_subscriber_state_v3",
      lockKey: "topupcuan_subscriber_leader_v3",
      legacyCountKey: "topupcuan_subscribers",
      legacyTimeKey: "topupcuan_subscribers_time",
      stateVersion: 3,
      minCount: 1000,
      initialMin: 5200,
      initialMax: 7900,
      lockLifetime: 16000,
      rollerCycles: 9,
      rollerMiddleCycle: 4
    });

    const bgCharacters = document.getElementById("bgCharacters");
    const goldParticles = document.getElementById("goldParticles");
    const sparkles = document.getElementById("sparkles");
    const subscriberRoller = document.getElementById("subscriberRoller");

    const mobileQuery = window.matchMedia("(max-width: 768px)");
    const reducedMotionQuery = window.matchMedia("(prefers-reduced-motion: reduce)");
    const tabId = typeof crypto !== "undefined" && crypto.randomUUID
      ? crypto.randomUUID()
      : `${Date.now()}-${Math.random().toString(16).slice(2)}`;

    let charactersCreated = false;
    let particlesCreated = false;
    let sparklesCreated = false;
    let resizeTimer = null;
    let subscriberTimer = null;
    let rollerSlots = [];
    let rollerPattern = "";
    let displayedCount = null;
    let directionClassTimer = null;

    function isMobileView() {
      return mobileQuery.matches || window.innerWidth <= 768;
    }

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function clamp(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function shuffleArray(arr) {
      const copy = [...arr];

      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }

      return copy;
    }

    function formatNumber(num) {
      return Math.round(num).toLocaleString("en-US");
    }

    function safeGet(key) {
      try {
        return localStorage.getItem(key);
      } catch (error) {
        return null;
      }
    }

    function safeSet(key, value) {
      try {
        localStorage.setItem(key, value);
        return true;
      } catch (error) {
        return false;
      }
    }

    function safeRemove(key) {
      try {
        localStorage.removeItem(key);
      } catch (error) {
        // Storage dapat diblokir di private mode/iframe; halaman tetap berjalan.
      }
    }

    function effectCounts() {
      const lowPower =
        (Number(navigator.deviceMemory) > 0 && Number(navigator.deviceMemory) <= 4) ||
        (Number(navigator.hardwareConcurrency) > 0 && Number(navigator.hardwareConcurrency) <= 4);

      if (isMobileView() || reducedMotionQuery.matches) {
        return { particles: 0, sparkles: 0, characters: 0 };
      }

      if (lowPower || window.innerWidth < 1100) {
        return { particles: 28, sparkles: 20, characters: 14 };
      }

      return { particles: 42, sparkles: 30, characters: 20 };
    }

    function clearBackgroundEffects() {
      bgCharacters.replaceChildren();
      goldParticles.replaceChildren();
      sparkles.replaceChildren();
      charactersCreated = false;
      particlesCreated = false;
      sparklesCreated = false;
    }

    function createGoldParticles() {
      const total = effectCounts().particles;

      if (total === 0) {
        goldParticles.replaceChildren();
        particlesCreated = false;
        return;
      }

      if (particlesCreated) return;
      particlesCreated = true;

      const fragment = document.createDocumentFragment();

      for (let i = 0; i < total; i += 1) {
        const particle = document.createElement("span");
        const size = random(2, 7);
        particle.className = "particle";
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.left = `${random(0, 100)}%`;
        particle.style.top = `${random(28, 100)}%`;
        particle.style.animationDuration = `${random(5.5, 11)}s`;
        particle.style.animationDelay = `${random(0, 8)}s`;
        particle.style.setProperty("--drift-x", `${random(-26, 26)}px`);
        fragment.appendChild(particle);
      }

      goldParticles.appendChild(fragment);
    }

    function createSparkles() {
      const total = effectCounts().sparkles;

      if (total === 0) {
        sparkles.replaceChildren();
        sparklesCreated = false;
        return;
      }

      if (sparklesCreated) return;
      sparklesCreated = true;

      const fragment = document.createDocumentFragment();

      for (let i = 0; i < total; i += 1) {
        const sparkle = document.createElement("span");
        sparkle.className = "spark";
        sparkle.style.left = `${random(0, 100)}%`;
        sparkle.style.top = `${random(24, 100)}%`;
        sparkle.style.animationDuration = `${random(4, 7)}s`;
        sparkle.style.animationDelay = `${random(0, 6)}s`;
        fragment.appendChild(sparkle);
      }

      sparkles.appendChild(fragment);
    }

    function createCharacters() {
      const total = effectCounts().characters;

      if (total === 0) {
        bgCharacters.replaceChildren();
        charactersCreated = false;
        return;
      }

      if (charactersCreated) return;
      charactersCreated = true;

      const fragment = document.createDocumentFragment();
      const pool = shuffleArray(characters);

      for (let i = 0; i < total; i += 1) {
        const wrap = document.createElement("div");
        const move = document.createElement("span");
        const img = document.createElement("img");

        wrap.className = "char";
        move.className = "char-move";
        img.src = pool[i % pool.length];
        img.alt = "";
        img.decoding = "async";
        img.loading = "lazy";

        img.onerror = () => wrap.remove();

        wrap.style.width = `${random(72, 155)}px`;
        wrap.style.left = `${random(0, 92)}%`;
        wrap.style.top = `${random(2, 88)}%`;
        wrap.style.animationDelay = `${random(0, 7)}s`;
        wrap.style.setProperty("--fadeDur", `${random(6.2, 10.2)}s`);
        wrap.style.setProperty("--sideDur", `${random(5.5, 9.5)}s`);
        wrap.style.setProperty("--maxOpacity", random(0.2, 0.4));
        wrap.style.setProperty("--driftAmp", `${random(6, 16)}px`);
        wrap.style.setProperty("--sideAmp", `${random(5, 18)}px`);
        img.style.opacity = random(0.66, 0.84);

        move.appendChild(img);
        wrap.appendChild(move);
        fragment.appendChild(wrap);
      }

      bgCharacters.appendChild(fragment);
    }

    function buildBackgroundEffects() {
      if (isMobileView() || reducedMotionQuery.matches) {
        clearBackgroundEffects();
        return;
      }

      const create = () => {
        createGoldParticles();
        createSparkles();
        createCharacters();
      };

      if ("requestIdleCallback" in window) {
        window.requestIdleCallback(create, { timeout: 800 });
      } else {
        window.setTimeout(create, 30);
      }
    }

    function buildRoller(pattern) {
      subscriberRoller.replaceChildren();
      rollerSlots = [];
      rollerPattern = pattern;
      const fragment = document.createDocumentFragment();

      for (const char of pattern) {
        if (/\d/.test(char)) {
          const slot = document.createElement("span");
          const strip = document.createElement("span");
          slot.className = "odo-digit";
          strip.className = "odo-strip";

          for (let cycle = 0; cycle < CONFIG.rollerCycles; cycle += 1) {
            for (let digitValue = 0; digitValue <= 9; digitValue += 1) {
              const digit = document.createElement("span");
              digit.textContent = String(digitValue);
              strip.appendChild(digit);
            }
          }

          slot.appendChild(strip);
          fragment.appendChild(slot);
          rollerSlots.push({
            type: "digit",
            strip,
            currentIndex: CONFIG.rollerMiddleCycle * 10,
            currentDigit: 0,
            resetTimer: null
          });
        } else {
          const separator = document.createElement("span");
          separator.className = "odo-sep";
          separator.textContent = char;
          fragment.appendChild(separator);
          rollerSlots.push({ type: "separator" });
        }
      }

      subscriberRoller.appendChild(fragment);
    }

    function ensureRollerPattern(numberText) {
      const pattern = numberText.replace(/\d/g, "0");
      const changed = rollerPattern !== pattern;

      if (changed) buildRoller(pattern);
      return changed;
    }

    function setDirectionFeedback(direction) {
      window.clearTimeout(directionClassTimer);
      subscriberRoller.classList.remove("is-up", "is-down");

      if (direction === 0 || reducedMotionQuery.matches) return;

      requestAnimationFrame(() => {
        subscriberRoller.classList.add(direction > 0 ? "is-up" : "is-down");
        directionClassTimer = window.setTimeout(() => {
          subscriberRoller.classList.remove("is-up", "is-down");
        }, 650);
      });
    }

    function normalizeRollerSlot(slot) {
      if (slot.currentIndex >= 20 && slot.currentIndex <= 69) return;

      slot.currentIndex = CONFIG.rollerMiddleCycle * 10 + slot.currentDigit;
      slot.strip.style.transition = "none";
      slot.strip.style.transform = `translate3d(0, calc(var(--odo-h) * -${slot.currentIndex}), 0)`;
      void slot.strip.offsetHeight;
      slot.strip.style.transition = "";
    }

    function setRollingNumber(number, immediate = false) {
      const rounded = Math.max(CONFIG.minCount, Math.round(number));
      const text = formatNumber(rounded);
      const patternChanged = ensureRollerPattern(text);
      const previous = displayedCount;
      const direction = previous === null ? 0 : Math.sign(rounded - previous);
      const shouldJump = immediate || patternChanged || previous === null || reducedMotionQuery.matches;

      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const slot = rollerSlots[i];

        if (!slot || slot.type !== "digit") continue;

        const targetDigit = Number(char);
        window.clearTimeout(slot.resetTimer);

        if (shouldJump) {
          slot.currentDigit = targetDigit;
          slot.currentIndex = CONFIG.rollerMiddleCycle * 10 + targetDigit;
          slot.strip.style.transition = "none";
          slot.strip.style.transform = `translate3d(0, calc(var(--odo-h) * -${slot.currentIndex}), 0)`;
          void slot.strip.offsetHeight;
          slot.strip.style.transition = "";
          continue;
        }

        if (targetDigit === slot.currentDigit) continue;

        let steps;
        if (direction < 0) {
          steps = (slot.currentDigit - targetDigit + 10) % 10;
          slot.currentIndex -= steps || 10;
        } else {
          steps = (targetDigit - slot.currentDigit + 10) % 10;
          slot.currentIndex += steps || 10;
        }

        slot.currentDigit = targetDigit;
        const distance = Math.max(1, steps || 10);
        const duration = clamp(390 + distance * 34 + i * 16, 430, 780);
        slot.strip.style.transitionDuration = `${duration}ms`;
        slot.strip.style.transform = `translate3d(0, calc(var(--odo-h) * -${slot.currentIndex}), 0)`;
        slot.resetTimer = window.setTimeout(() => normalizeRollerSlot(slot), duration + 40);
      }

      displayedCount = rounded;
      subscriberRoller.setAttribute("aria-label", `${formatNumber(rounded)} subscribers`);
      setDirectionFeedback(direction);
    }

    function makeInitialState() {
      const now = Date.now();
      return {
        version: CONFIG.stateVersion,
        count: randomInt(CONFIG.initialMin, CONFIG.initialMax),
        updatedAt: now,
        createdAt: now
      };
    }

    function migrateLegacyState() {
      const legacyCount = Number.parseInt(safeGet(CONFIG.legacyCountKey), 10);
      const legacyTime = Number.parseInt(safeGet(CONFIG.legacyTimeKey), 10);

      if (!Number.isFinite(legacyCount)) return null;

      const now = Date.now();
      const migrated = {
        version: CONFIG.stateVersion,
        count: Math.max(CONFIG.minCount, legacyCount),
        updatedAt: Number.isFinite(legacyTime) ? legacyTime : now,
        createdAt: now
      };

      safeRemove(CONFIG.legacyCountKey);
      safeRemove(CONFIG.legacyTimeKey);
      safeSet(CONFIG.storageKey, JSON.stringify(migrated));
      return migrated;
    }

    function readState() {
      const raw = safeGet(CONFIG.storageKey);

      if (raw) {
        try {
          const parsed = JSON.parse(raw);
          const isValid =
            parsed &&
            parsed.version === CONFIG.stateVersion &&
            Number.isFinite(Number(parsed.count)) &&
            Number.isFinite(Number(parsed.updatedAt));

          if (isValid) {
            return {
              version: CONFIG.stateVersion,
              count: Math.max(CONFIG.minCount, Math.round(Number(parsed.count))),
              updatedAt: Number(parsed.updatedAt),
              createdAt: Number(parsed.createdAt) || Date.now()
            };
          }
        } catch (error) {
          // State rusak akan dibuat ulang secara aman.
        }
      }

      return migrateLegacyState() || makeInitialState();
    }

    function saveState(state) {
      safeSet(CONFIG.storageKey, JSON.stringify(state));
    }

    function activityBias(date = new Date()) {
      const hour = date.getHours();
      if (hour >= 19 && hour <= 23) return 1.18;
      if (hour >= 11 && hour <= 14) return 1.1;
      if (hour >= 1 && hour <= 6) return 0.72;
      return 1;
    }

    function sampleSubscriberDelta(bias = 1) {
      const roll = Math.random();
      let delta = 0;

      if (roll < 0.45) delta = 0;
      else if (roll < 0.69) delta = 1;
      else if (roll < 0.91) delta = -1;
      else if (roll < 0.95) delta = 2;
      else if (roll < 0.985) delta = -2;
      else if (roll < 0.995) delta = 3;
      else delta = -3;

      if (bias > 1 && delta === 0 && Math.random() < (bias - 1) * 0.3) {
        return 1;
      }

      if (bias < 1 && delta > 0 && Math.random() > bias) {
        return 0;
      }

      return delta;
    }

    function reconcileElapsedTime(state) {
      const now = Date.now();
      const elapsedMs = clamp(now - state.updatedAt, 0, 1000 * 60 * 60 * 24 * 30);

      // Refresh cepat tidak memicu angka baru sehingga angka tidak "balik" atau melompat.
      if (elapsedMs < 12000) {
        return { ...state, updatedAt: now };
      }

      const virtualTicks = Math.min(260, Math.floor(elapsedMs / 8000));
      let count = state.count;

      for (let i = 0; i < virtualTicks; i += 1) {
        count += sampleSubscriberDelta(activityBias());
      }

      // Untuk jeda sangat lama, tambahkan pertumbuhan bersih yang kecil dan terbatas.
      const elapsedDays = Math.floor(elapsedMs / 86400000);
      if (elapsedDays > 0) {
        count += randomInt(-2, 7) * Math.min(elapsedDays, 12);
      }

      return {
        ...state,
        count: Math.max(CONFIG.minCount, count),
        updatedAt: now
      };
    }

    function tryAcquireLeaderLock() {
      const now = Date.now();
      const raw = safeGet(CONFIG.lockKey);
      let current = null;

      if (raw) {
        try {
          current = JSON.parse(raw);
        } catch (error) {
          current = null;
        }
      }

      const canAcquire =
        !current ||
        current.owner === tabId ||
        !Number.isFinite(Number(current.expiresAt)) ||
        Number(current.expiresAt) <= now;

      if (!canAcquire) return false;

      safeSet(CONFIG.lockKey, JSON.stringify({
        owner: tabId,
        expiresAt: now + CONFIG.lockLifetime
      }));

      const verifyRaw = safeGet(CONFIG.lockKey);
      if (!verifyRaw) return true;

      try {
        return JSON.parse(verifyRaw).owner === tabId;
      } catch (error) {
        return true;
      }
    }

    function nextSubscriberDelay() {
      const hour = new Date().getHours();
      if (hour >= 19 && hour <= 23) return randomInt(3800, 7600);
      if (hour >= 1 && hour <= 6) return randomInt(7200, 14000);
      return randomInt(4800, 9800);
    }

    function runSubscriberTick() {
      if (document.hidden) {
        subscriberTimer = window.setTimeout(runSubscriberTick, 5000);
        return;
      }

      let state = readState();

      if (tryAcquireLeaderLock()) {
        const delta = sampleSubscriberDelta(activityBias());
        state = {
          ...state,
          count: Math.max(CONFIG.minCount, state.count + delta),
          updatedAt: Date.now()
        };
        saveState(state);
      }

      if (state.count !== displayedCount) {
        setRollingNumber(state.count);
      }

      subscriberTimer = window.setTimeout(runSubscriberTick, nextSubscriberDelay());
    }

    function startLiveSubscribers() {
      let state = reconcileElapsedTime(readState());
      saveState(state);
      setRollingNumber(state.count, true);
      subscriberTimer = window.setTimeout(runSubscriberTick, randomInt(1800, 3200));
    }

    function handleResponsiveBackgroundEffects() {
      window.clearTimeout(resizeTimer);
      resizeTimer = window.setTimeout(() => {
        clearBackgroundEffects();
        buildBackgroundEffects();
      }, 180);
    }

    window.addEventListener("resize", handleResponsiveBackgroundEffects, { passive: true });

    window.addEventListener("storage", (event) => {
      if (event.key !== CONFIG.storageKey || !event.newValue) return;

      try {
        const incoming = JSON.parse(event.newValue);
        if (Number.isFinite(Number(incoming.count)) && incoming.count !== displayedCount) {
          setRollingNumber(Number(incoming.count));
        }
      } catch (error) {
        // Abaikan event storage yang tidak valid.
      }
    });

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) {
        const state = reconcileElapsedTime(readState());
        saveState(state);
        if (state.count !== displayedCount) setRollingNumber(state.count);
      }
    });

    if (typeof reducedMotionQuery.addEventListener === "function") {
      reducedMotionQuery.addEventListener("change", handleResponsiveBackgroundEffects);
    }

    buildBackgroundEffects();
    startLiveSubscribers();
  </script>
</body>
</html>
